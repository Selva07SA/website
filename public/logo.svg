<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Problem logo">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>
  <rect width="1200" height="600" fill="#f4f4f4" />
  <rect x="700" y="150" width="460" height="26" rx="3" fill="#0a0a0a" filter="url(#softShadow)" />
  <rect x="40" y="410" width="600" height="36" rx="4" fill="#0a0a0a" filter="url(#softShadow)" />
  <g filter="url(#softShadow)">
